# Render Blueprint 配置
# 自动部署配置

services:
  - type: web
    name: todo-system
    runtime: python
    region: ohio
    plan: free
    branch: master
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
