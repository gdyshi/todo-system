# Render Blueprint 配置
# 部署配置

services:
  - type: web
    name: todo-system
    runtime: python3.11
    region: ohio
    plan: free
    branch: master
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
