<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人任务管理系统</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 个人任务管理系统</h1>
            <div id="mode-info" class="mode-info"></div>
        </header>

        <main>
            <!-- 筛选 -->
            <section class="filters">
                <div class="filter-row">
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="all">全部</button>
                        <button class="filter-btn" data-filter="work">工作</button>
                        <button class="filter-btn" data-filter="life">生活</button>
                        <button class="filter-btn" data-filter="education">教育</button>
                    </div>
                    <div class="status-filters">
                        <label><input type="checkbox" class="status-filter" value="in_progress" checked> 进行中</label>
                        <label><input type="checkbox" class="status-filter" value="pending" checked> 待处理</label>
                        <label><input type="checkbox" class="status-filter" value="completed"> 已完成</label>
                    </div>
                </div>
            </section>

            <!-- 任务列表 - 放在最上面 -->
            <section class="task-list">
                <h2>任务列表 <span id="task-count">(0)</span></h2>
                <div id="tasks-container">
                    <p class="loading">加载中...</p>
                </div>
            </section>

            <!-- 添加任务表单 - 放在任务列表下面 -->
            <section class="task-form collapsed">
                <div class="form-header" onclick="toggleTaskForm()">
                    <h2>➕ 添加新任务</h2>
                    <span class="toggle-icon">▼</span>
                </div>
                <form id="add-task-form" class="form-content">
                    <div class="form-group">
                        <label for="task-title">任务标题 *</label>
                        <input type="text" id="task-title" required placeholder="输入任务标题...">
                    </div>

                    <div class="form-group">
                        <label for="task-description">任务描述</label>
                        <textarea id="task-description" rows="3" placeholder="输入任务描述..."></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="task-category">分类</label>
                            <select id="task-category">
                                <option value="auto">自动</option>
                                <option value="work">工作</option>
                                <option value="life">生活</option>
                                <option value="education">教育</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="task-priority">优先级</label>
                            <select id="task-priority">
                                <option value="0">低</option>
                                <option value="5">中</option>
                                <option value="9">高</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="task-due-time">截止时间</label>
                            <input type="datetime-local" id="task-due-time">
                        </div>

                        <div class="form-group">
                            <label for="task-location">地点提醒（JSON格式）</label>
                            <input type="text" id="task-location" placeholder='{"lat": 31.2304, "lon": 121.4737}'>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="task-subtasks">子任务（每行一个）</label>
                        <textarea id="task-subtasks" rows="3" placeholder="输入子任务，每行一个..."></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">添加任务</button>
                </form>
            </section>
        </main>

        <!-- 状态栏 - 最下面 -->
        <footer class="status-bar">
            <div class="status-left">
                <span id="stats-summary">加载中...</span>
            </div>
            <div class="status-right">
                <span id="current-position">📋 任务列表</span>
            </div>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
