# Render Preview 环境配置
# 用于 PR 预览部署

services:
  # 后端 API Preview
  - type: web
    name: todo-api-preview
    env: python
    region: oregon
    plan: free
    branch: "*/HEAD"
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    headers:
      - path: "/*"
        name: Cache-Control
        value: no-cache
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: todo-db-preview
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11"
