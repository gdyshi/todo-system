<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人任务管理系统</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 个人任务管理系统</h1>
            <div id="mode-info" class="mode-info"></div>
        </header>

        <main>
            <!-- 添加任务表单 - 放在最上面 -->
            <section class="task-form compact">
                <form id="add-task-form">
                    <div class="form-group task-input-group">
                        <input type="text" id="task-input" required placeholder="输入任务描述，AI 将自动拆解子任务..." autocomplete="off">
                        <button type="submit" class="btn btn-primary btn-add">添加</button>
                    </div>
                </form>
            </section>

            <!-- 筛选 -->
            <section class="filters">
                <div class="filter-row">
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="all">全部</button>
                        <button class="filter-btn" data-filter="work">工作</button>
                        <button class="filter-btn" data-filter="life">生活</button>
                        <button class="filter-btn" data-filter="education">教育</button>
                    </div>
                    <button id="toggle-completed" class="btn btn-sm">显示已完成</button>
                </div>
            </section>

            <!-- 任务列表 -->
            <section class="task-list">
                <h2>任务列表 <span id="task-count">(0)</span></h2>
                <div id="tasks-container">
                    <p class="loading">加载中...</p>
                </div>
            </section>
        </main>

        <!-- 状态栏 -->
        <footer class="status-bar">
            <div class="status-left">
                <span id="stats-brief">加载中...</span>
            </div>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
