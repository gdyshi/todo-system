name: Manual Production Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: '部署目标: staging 或 production'
        type: choice
        options:
          - staging
          - production
        required: true
      confirm:
        description: '确认发布？此操作将部署到生产环境'
        type: boolean
        required: true

jobs:
  health-check:
    name: 部署前健康检查
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'production'
    timeout-minutes: 5
    
    steps:
      - name: Check Render backend health
        run: |
          echo "=== 部署前健康检查 ==="
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://todo-system-msvx.onrender.com/health)
            if [ "$STATUS" = "200" ]; then
              echo "✅ 后端健康: OK"
              break
            fi
            echo "⏳ 等待后端就绪... ($i/30)"
            sleep 3
          done
          
          if [ "$STATUS" != "200" ]; then
            echo "❌ 后端不健康"
            exit 1
          fi

      - name: Check Vercel frontend
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://todo-system-psi.vercel.app || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ 前端健康: OK"
          else
            echo "⚠️ 前端返回: $HTTP_CODE (将使用 Staging 部署)"
          fi

  deploy:
    name: 部署
    needs: health-check
    if: github.event.inputs.confirm == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine deploy target
        run: |
          if [ "${{ github.event.inputs.environment }}" = "production" ]; then
            echo "TARGET=production"
            echo "VERCEL_URL=https://todo-system-psi.vercel.app"
          else
            echo "TARGET=staging"
            echo "VERCEL_URL=https://todo-system-git-refs-headsmaster-gdyshis-projects.vercel.app"
          fi
          echo "TARGET=$TARGET" >> $GITHUB_ENV
          echo "VERCEL_URL=$VERCEL_URL" >> $GITHUB_ENV

      - name: Deploy to Render (production)
        if: env.TARGET == 'production'
        run: echo "✅ 跳过 Render 手动部署（已配置自动部署）"

      - name: Deploy to Render (staging)
        if: env.TARGET == 'staging'
        run: echo "✅ 跳过（Staging 通过 PR 合并自动部署）"

      - name: Verify deployment
        run: |
          echo "=== 验证部署 ==="
          echo "目标: ${{ env.TARGET }}"
          echo "⏳ 等待 30 秒让部署生效..."
          sleep 30
          
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://todo-system-msvx.onrender.com/health)
          if [ "$STATUS" = "200" ]; then
            echo "✅ 部署验证通过"
          else
            echo "❌ 部署验证失败 (HTTP $STATUS)"
            exit 1
          fi

      - name: Summary
        run: |
          echo "==================================="
          echo "部署完成"
          echo "==================================="
          echo "目标: ${{ env.TARGET }}"
          echo "时间: $(date)"
          echo "触发人: ${{ github.actor }}"
          echo "Commit: ${{ github.sha }}"
          echo "==================================="
