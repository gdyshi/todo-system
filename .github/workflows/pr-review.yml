name: PR Review & Test

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  automated-tests:
    name: 自动化测试
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          cd backend
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: 运行测试
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=term

  pr-summary:
    name: PR 总结
    runs-on: ubuntu-latest
    needs: automated-tests
    if: always()
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 生成总结
        id: summary
        run: |
          echo "## 🤖 PR 自动化测试报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "运行 ID: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "提交 SHA: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: 发布评论
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const fs = require('fs');

            const summary = `
            ## 🤖 PR 自动化测试报告

            ### 📊 测试结果
            测试运行在 \`${{ process.env.GITHUB_SHA }}\`

            [查看详细日志](https://github.com/\${{ process.env.GITHUB_REPOSITORY }}/actions/runs/\${{ process.env.GITHUB_RUN_ID }})
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
