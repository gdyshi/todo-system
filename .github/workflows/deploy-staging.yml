name: Deploy to Staging

# WARNING: This workflow runs E2E tests against the production API!
# These tests create real data in the production database.
# Only use this if you accept test data pollution or have a dedicated test database.

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy-backend:
    name: Deploy Backend to Staging
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Render deployment
        run: |
          echo "Triggering Staging backend deployment..."
          curl -X POST ${{ secrets.RENDER_STAGING_DEPLOY_HOOK }} \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'

      - name: Wait for deployment
        run: sleep 90

      - name: Health check
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://todo-system-msvx.onrender.com/health)
            if [ "$STATUS" = "200" ]; then
              echo "Backend health check passed"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 3
          done
          echo "Backend health check failed"
          exit 1

  deploy-frontend:
    name: Deploy Frontend to Staging
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: --prod

  e2e-full:
    name: Full E2E Tests
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run all E2E tests
        env:
          # WARNING: Using production API - this creates test data in production!
          FRONTEND_URL: https://todo-system-psi.vercel.app
          API_BASE_URL: https://todo-system-msvx.onrender.com/api
        run: npx playwright test --reporter=html

      - name: Cleanup test data
        if: always()
        env:
          API_BASE_URL: https://todo-system-msvx.onrender.com/api
        run: node tests/e2e/cleanup-test-data.js

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-full-report
          path: playwright-report/
          retention-days: 14

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: test-results/**/*.png
          retention-days: 14

  performance:
    name: Performance Tests
    needs: e2e-full
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lighthouse
        uses: foo-software/lighthouse-check-action@master
        with:
          urls: https://todo-system-psi.vercel.app
          budgetPath: .lighthouseci.json

  create-issue:
    name: Create Failure Issue
    needs: [e2e-full]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Staging E2E Failed - ${new Date().toISOString().split('T')[0]}`;
            const body = `## Automated Test Failure Report
            
            **Branch**: \`${{ github.ref }}\`
            **Commit**: \`${{ github.sha }}\`
            **Actor**: ${{ github.actor }}
            
            ### Links
            - [Actions](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - [Staging](https://todo-system-psi.vercel.app)
            - [API](https://todo-system-msvx.onrender.com/health)
            `;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['bug', 'automated', 'staging']
            });
