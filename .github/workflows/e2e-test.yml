name: E2E Tests + Performance

# WARNING: This workflow runs E2E tests against production API!
# Only enable this if you have a dedicated test database or accept test data pollution.
# Consider using a staging environment for automated E2E testing.

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  e2e-test:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: .

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for Render backend
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://todo-system-msvx.onrender.com/health)
            if [ "$STATUS" = "200" ]; then
              echo "Backend is ready"
              break
            fi
            echo "Waiting for backend... ($i)"
            sleep 3
          done

      - name: Run E2E tests
        env:
          FRONTEND_URL: https://todo-system-psi.vercel.app
          API_BASE_URL: https://todo-system-msvx.onrender.com/api
        run: npx playwright test --reporter=list

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Cleanup test data
        if: always()
        env:
          API_BASE_URL: https://todo-system-msvx.onrender.com/api
        run: node tests/e2e/cleanup-test-data.js
