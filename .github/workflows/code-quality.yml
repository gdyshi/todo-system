name: Code Quality

on:
  pull_request:
    branches: [main, master]

jobs:
  super-linter:
    name: Super-Linter 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 运行 Super-Linter
        uses: BrandwatchLtd/super-linter-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
