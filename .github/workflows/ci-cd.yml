name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

permissions:
  contents: write
  pull-requests: write
  deployments: write

jobs:
  # ==================== 代码质量检查 ====================
  lint:
    name: 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install black flake8 mypy
          pip install -r requirements.txt

      - name: Black 格式检查
        run: black --check --diff backend/

      - name: Flake8 Lint 检查
        run: flake8 backend/ --max-line-length=100 --ignore=E501,W503

      - name: MyPy 类型检查
        run: mypy backend/ --ignore-missing-imports

  # ==================== 单元测试 ====================
  test:
    name: 单元测试 + 集成测试
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: 运行所有测试
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term

      - name: 上传覆盖率报告
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          fail_ci_if_error: false

  # ==================== 安全扫描 ====================
  security:
    name: 安全扫描
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 运行 Trivy 漏洞扫描
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: 上传扫描结果
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # ==================== PR 阶段：Preview 部署 ====================
  deploy-preview:
    name: 部署 Preview 环境
    needs: [lint, test]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      preview-url: ${{ steps.vercel.outputs.preview-url }}
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 部署到 Vercel Preview
        id: vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-comment: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # ==================== PR 阶段：轻量 E2E 测试 ====================
  e2e-light:
    name: 轻量 E2E 测试（关键路径）
    needs: deploy-preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 pnpm
        run: npm install -g pnpm

      - name: 安装依赖
        run: pnpm install

      - name: 安装 Playwright
        run: npx playwright install --with-deps chromium

      - name: 运行关键路径测试
        env:
          FRONTEND_URL: ${{ needs.deploy-preview.outputs.preview-url }}
          API_BASE_URL: https://todo-system-msvx.onrender.com/api
        run: |
          # 只运行关键路径测试
          npx playwright test tests/e2e/test_create_task.spec.ts --reporter=list

      - name: 上传测试结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-light-report
          path: playwright-report/
          retention-days: 7

  # ==================== PR 状态报告 ====================
  pr-report:
    name: PR 检查完成报告
    needs: [lint, test, security, e2e-light]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    
    steps:
      - name: 报告结果
        uses: actions/github-script@v7
        with:
          script: |
            const results = {
              '代码质量': '${{ needs.lint.result }}',
              '单元测试': '${{ needs.test.result }}',
              '安全扫描': '${{ needs.security.result }}',
              'E2E轻量测试': '${{ needs.e2e-light.result }}'
            };
            
            const status = Object.values(results).every(r => r === 'success') ? '✅' : '❌';
            const body = `## ${status} PR 检查结果\n\n` +
              Object.entries(results).map(([k, v]) => `- ${k}: ${v === 'success' ? '✅' : '❌'}`).join('\n') +
              '\n\n---\n*请确保所有检查通过后再请求审查*';
            
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # ==================== 推送到 master：部署前端 ====================
  deploy-frontend:
    needs: [lint, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend

  # ==================== 推送到 master：通知 ====================
  notify:
    needs: [test, deploy-frontend]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 成功通知
        if: success()
        run: echo "✅ 流程执行成功！"

      - name: 失败通知
        if: failure()
        run: echo "❌ 流程执行失败，请检查日志"
