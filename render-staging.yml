# Render Staging 环境配置
# 用于自动化部署后端到 Staging

services:
  # 后端 API Staging
  - type: web
    name: todo-api-staging
    env: python
    region: oregon
    plan: free
    branch: master
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    healthCheckInterval: 30
    headers:
      - path: "/*"
        name: Cache-Control
        value: no-cache
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: todo-db-staging
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11"
      - key: ENVIRONMENT
        value: staging

  # Staging 数据库
  - type: pserv
    name: todo-db-staging
    env: postgres
    plan: free
    ipAllowList: []
